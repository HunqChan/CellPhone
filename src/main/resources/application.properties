spring.application.name=CellPhone

spring.datasource.url=jdbc:mysql://localhost:3306/cellphone_db
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=Y2VsbHBob25lLWVjb21tZXJjZS1zZWNyZXQta2V5LWZvci1qd3QtYXV0aGVudGljYXRpb24tMjAyNA==
jwt.expiration=86400000

# Đổi đường dẫn giao diện Swagger (Mặc định là /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html

# Cấu hình để chạy data.sql sau khi Hibernate tạo/cập nhật xong schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
